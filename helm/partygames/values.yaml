frontend:
  image:
    repository: grekodocker/partygames-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "128Mi"

backend:
  image:
    repository: grekodocker/partygames-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    limits:
      cpu: "500m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "128Mi"
  storage:
    mountPath: /app/data
    # storageClass: ""  # leave unset to use the cluster default StorageClass
    size: 1Gi

terminationGracePeriodSeconds: 2

ingress:
  enabled: true
  host: partygames.alexgr.space
  tls:
    secretName: partygames-alexgr-space-tls
